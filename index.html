<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImmoCalc Pro - Dein smarter Finanzplaner</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #217346;
            --bg: #f4f7f6;
            --card: #ffffff;
            --accent: #0078d4;
        }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 1100px; margin: auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); padding: 10px 0; margin-bottom: 20px; }
        h1 { margin: 0; color: var(--primary); font-size: 1.3rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        .sub-info { font-size: 0.85rem; color: var(--accent); font-weight: bold; margin-top: 3px; display: block; }
        
        input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
        input[type="range"] { width: 100%; cursor: pointer; height: 25px; }
        
        .result-box { background: var(--primary); color: white; padding: 15px; border-radius: 6px; margin-top: 10px; text-align: center; }
        .result-val { font-size: 1.4rem; font-weight: bold; display: block; }

        .chart-container { position: relative; height: 220px; width: 100%; margin-top: 10px; }

        .table-wrapper { overflow-x: auto; background: white; border-radius: 8px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th { background: var(--primary); color: white; padding: 10px; text-align: right; white-space: nowrap; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: right; font-family: monospace; }
        tr:nth-child(even) { background: #f9f9f9; }
        .footer-row { background: #eee !important; font-weight: bold; }

        .btn-print { background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }

        @media print {
            .input-section, .btn-print, header { display: none; }
            body { background: white; padding: 0; }
            .card { box-shadow: none; border: none; padding: 0; }
            .table-wrapper { overflow: visible; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🏠 ImmoCalc Pro</h1>
        <button class="btn-print" onclick="window.print()">Als PDF / Drucken</button>
    </header>

    <div class="grid input-section">
        <div class="card">
            <div class="input-group">
                <label>Kaufpreis (€)</label>
                <input type="number" id="kaufpreis" value="400000" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>Wohnfläche (m²)</label>
                <input type="number" id="flaeche" value="90" oninput="calculate()">
                <span class="sub-info" id="preisQmDisplay">Kaufpreis: 0,00 €/m²</span>
            </div>
            <div class="input-group">
                <label>Grunderwerbsteuer (%)</label>
                <input type="number" id="steuer" value="5.0" step="0.1" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>Notar & Grundbuch (%)</label>
                <input type="number" id="notar" value="2.0" step="0.1" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>Eigenkapital (€)</label>
                <input type="number" id="ek" value="50000" oninput="calculate()">
            </div>
            <div class="result-box">
                <span>Nötiges Darlehen:</span>
                <span class="result-val" id="darlehenDisplay">0,00 €</span>
            </div>
        </div>

        <div class="card">
            <div class="input-group">
                <label>Zinssatz: <span id="zinsVal">3.9</span>%</label>
                <input type="range" id="zins" min="0.1" max="10" step="0.05" value="3.9" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>Jährliche Rate (€)</label>
                <input type="number" id="rateJahr" value="24000" oninput="calculate()">
                <span class="sub-info" id="rateMonatDisplay">Monatliche Rate: 0,00 €</span>
            </div>
            <div class="input-group">
                <label>Sondertilgung p.a. (€)</label>
                <input type="number" id="soti" value="0" oninput="calculate()">
            </div>
            <div class="chart-container">
                <canvas id="myChart"></canvas>
            </div>
            <div id="infoLaufzeit" style="text-align: center; margin-top: 10px; font-weight: bold; color: var(--accent); font-size: 1rem;"></div>
        </div>
    </div>

    <div class="table-wrapper card">
        <table>
            <thead>
                <tr>
                    <th>Jahr</th>
                    <th>Anfangsschuld</th>
                    <th>Zinsen</th>
                    <th>Tilgung + SoTi</th>
                    <th>Rate Gesamt</th>
                    <th>Restschuld</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
            <tfoot>
                <tr class="footer-row">
                    <td>Gesamt</td>
                    <td>-</td>
                    <td id="totalZins">0</td>
                    <td id="totalTilgung">0</td>
                    <td id="totalRate">0</td>
                    <td>0,00</td>
                </tr>
            </tfoot>
        </table>
    </div>
</div>

<script>
    let myChart;

    function format(val) {
        return val.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function calculate() {
        const kaufpreis = parseFloat(document.getElementById('kaufpreis').value) || 0;
        const flaeche = parseFloat(document.getElementById('flaeche').value) || 0;
        const steuer = (parseFloat(document.getElementById('steuer').value) || 0) / 100;
        const notar = (parseFloat(document.getElementById('notar').value) || 0) / 100;
        const ek = parseFloat(document.getElementById('ek').value) || 0;
        const zinsPa = (parseFloat(document.getElementById('zins').value) || 0) / 100;
        const rateJahr = parseFloat(document.getElementById('rateJahr').value) || 0;
        const soti = parseFloat(document.getElementById('soti').value) || 0;
        
        document.getElementById('zinsVal').innerText = document.getElementById('zins').value;

        // 1. Kaufpreis pro m² anzeigen
        if (flaeche > 0) {
            document.getElementById('preisQmDisplay').innerText = `Kaufpreis: ${format(kaufpreis / flaeche)} €/m²`;
        }

        // 2. Monatliche Rate anzeigen
        document.getElementById('rateMonatDisplay').innerText = `Monatliche Rate: ${format(rateJahr / 12)} €`;

        // Nebenkosten & Darlehen
        const nebenkosten = kaufpreis * (steuer + notar);
        const darlehen = (kaufpreis + nebenkosten) - ek;
        document.getElementById('darlehenDisplay').innerText = format(darlehen) + " €";

        let currentRest = darlehen;
        let tableHtml = "";
        let tZins = 0, tTilgung = 0, tRate = 0;
        let jahr = 1;

        if (darlehen > 0) {
            while (currentRest > 0.01 && jahr <= 60) {
                let anfang = currentRest;
                let zinsEuro = anfang * zinsPa;
                let tilgungNormal = rateJahr - zinsEuro;
                
                if (tilgungNormal < 0 && zinsPa > 0) {
                    document.getElementById('infoLaufzeit').innerText = "Rate deckt die Zinsen nicht!";
                    document.getElementById('tableBody').innerHTML = "";
                    return;
                }

                let tilgungGesamt = tilgungNormal + soti;
                if (tilgungGesamt > anfang) tilgungGesamt = anfang;
                
                let rateGesamt = zinsEuro + tilgungGesamt;
                let ende = anfang - tilgungGesamt;

                tZins += zinsEuro;
                tTilgung += tilgungGesamt;
                tRate += rateGesamt;

                tableHtml += `<tr>
                    <td>${jahr}</td>
                    <td>${format(anfang)}</td>
                    <td>${format(zinsEuro)}</td>
                    <td>${format(tilgungGesamt)}</td>
                    <td>${format(rateGesamt)}</td>
                    <td>${format(ende)}</td>
                </tr>`;

                currentRest = ende;
                jahr++;
            }
        }

        document.getElementById('tableBody').innerHTML = tableHtml;
        document.getElementById('totalZins').innerText = format(tZins);
        document.getElementById('totalTilgung').innerText = format(tTilgung);
        document.getElementById('totalRate').innerText = format(tRate);
        document.getElementById('infoLaufzeit').innerText = `Voraussichtliche Laufzeit: ${jahr - 1} Jahre`;

        updateChart(tZins, darlehen);
    }

    function updateChart(zinsen, darlehen) {
        const ctx = document.getElementById('myChart').getContext('2d');
        if (myChart) myChart.destroy();
        
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Zinsen gesamt', 'Darlehen'],
                datasets: [{
                    data: [zinsen, darlehen],
                    backgroundColor: ['#e74c3c', '#217346'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom' } }
            }
        });
    }

    calculate();
</script>

</body>
</html>
